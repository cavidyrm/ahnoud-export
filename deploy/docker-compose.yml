# Traefik routes by domain; host port is for direct IP access (preview / before DNS).
#
#   Domain:  https://ahnoudexport.com  (update Host() if your domain differs)
#   Direct:  http://<server-ip>:3004
#
# On the server: copy to APP_DIR (e.g. /opt/ahnoud-export). Set GitHub secret APP_DIR to the same path.
services:
  app:
    image: ghcr.io/cavidyrm/ahnoud-export:latest
    container_name: ahnoud-export
    restart: unless-stopped
    ports:
      - "3004:80"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.services.ahnoud-export.loadbalancer.server.port=80"
      - "traefik.http.routers.ahnoud-export.rule=Host(`ahnoudexport.com`) || Host(`www.ahnoudexport.com`)"
      - "traefik.http.routers.ahnoud-export.entrypoints=websecure"
      - "traefik.http.routers.ahnoud-export.tls=true"
      - "traefik.http.routers.ahnoud-export.tls.certresolver=myresolver"
      - "traefik.http.routers.ahnoud-export-http.rule=Host(`ahnoudexport.com`) || Host(`www.ahnoudexport.com`)"
      - "traefik.http.routers.ahnoud-export-http.entrypoints=web"
      - "traefik.http.routers.ahnoud-export-http.middlewares=ahnoud-export-redirect-https"
      - "traefik.http.middlewares.ahnoud-export-redirect-https.redirectscheme.scheme=https"

networks:
  traefik-public:
    external: true
